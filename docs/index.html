<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRM Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="hero">
    <p class="eyebrow">THEORIE DE LA RESONANCE MULTIVERSIELLE</p>
    <h1>TRM Navigator</h1>
    <p class="subtitle">Lecture intelligente de l ensemble du dossier: recherche semantique rapide, filtres par domaines, navigation de structure et apercu documentaire.</p>
  </header>

  <main class="layout">
    <aside class="panel tree-panel">
      <div class="panel-title-row">
        <h2>Structure</h2>
        <button id="collapseAllBtn" class="ghost">Tout reduire</button>
      </div>
      <div id="folderTree" class="folder-tree"></div>
    </aside>

    <section class="panel content-panel">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Rechercher un fichier, un dossier, un mot-cle..." />
        <select id="domainFilter">
          <option value="">Tous les domaines</option>
        </select>
        <select id="extFilter">
          <option value="">Toutes les extensions</option>
        </select>
        <select id="sortSelect">
          <option value="path">Tri: chemin</option>
          <option value="recent">Tri: plus recents</option>
          <option value="size">Tri: taille</option>
        </select>
      </div>

      <div id="stats" class="stats"></div>
      <div id="fileGrid" class="file-grid"></div>
    </section>
  </main>

  <dialog id="previewDialog" class="preview-dialog">
    <article>
      <header>
        <h3 id="previewTitle">Apercu</h3>
        <button id="closePreviewBtn" class="ghost">Fermer</button>
      </header>
      <p id="previewMeta" class="preview-meta"></p>
      <pre id="previewBody"></pre>
      <footer>
        <a id="githubLink" target="_blank" rel="noreferrer">Ouvrir sur GitHub</a>
      </footer>
    </article>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
